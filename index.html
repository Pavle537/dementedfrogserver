<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC304 | Live Map</title>
    <!-- Google Fonts & Lucide Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-dark: #0b0f19;
            --panel-bg: rgba(15, 23, 42, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* --- SLEEK FLOATING TOP BAR --- */
        header {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            height: 60px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .title-group h2 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .title-group p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* --- FULLSCREEN IFRAME MAP --- */
        .map-wrapper {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Floating UI Controls -->
    <header>
        <div class="title-group">
            <h2>MC304 Live Map</h2>
            <p>Survival World Perspective</p>
        </div>
        <div class="controls">
            <button class="btn" onclick="refreshMap()">
                <i data-lucide="refresh-cw" size="14"></i> Refresh
            </button>
            <button class="btn" onclick="toggleFullScreen()">
                <i data-lucide="maximize" size="14"></i> Fullscreen
            </button>
        </div>
    </header>

    <!-- The Map Frame -->
    <div class="map-wrapper" id="map-area">
        <iframe id="map-frame" src="https://viewer.mc304.boxtoplay.com/953198/web/index.html"></iframe>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Target map frame reload
        function refreshMap() {
            const frame = document.getElementById('map-frame');
            frame.src = frame.src;
        }

        // Handle clean container element fullscreen
        function toggleFullScreen() {
            let elem = document.getElementById("map-area");
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => {
                    console.error(`Error enabling fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
